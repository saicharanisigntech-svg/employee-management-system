<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Employee Management System</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <header>
        <h1>Employee Management System</h1>
        <span>Support & Contact</span>
    </header>

    <nav>
        <ul>
            <li><a href="../home/home.html">Dashboard</a></li>
            <li><a href="../employees/employees.html">Employees</a></li>
            <li><a href="../departments/departments.html">Departments</a></li>
            <li><a href="../attendance/attendance.html">Attendance</a></li>
            <li><a href="../about/about.html">About</a></li>
            <li><a href="../contact/contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main>
        <div class="contact-card">
            <h2 style="margin-bottom: 1.5rem;">Contact Support</h2>
            <form onsubmit="alert('Message sent successfully!'); return false;">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="4" required placeholder="Enter message"></textarea>
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Employee Management System. All Rights Reserved.</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
